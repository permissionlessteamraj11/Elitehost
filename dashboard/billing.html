<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03020A">
  <meta name="robots" content="noindex,nofollow">
  <title>Billing — EliteHosting.in</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/dashboard.css">
  <script src="/env.js"></script>
</head>
<body>
<div id="db-toast"></div>
<div class="db-layout">
  <aside id="db-sidebar" class="db-sidebar"></aside>
  <div class="db-main">
    <header id="db-topbar" class="db-topbar"></header>
    <main class="db-page" aria-label="Billing and credits">

      <div class="db-page-header">
        <h2 class="db-page-title">💳 Billing</h2>
        <p class="db-page-sub">Credits &amp; transaction history</p>
      </div>

      <!-- Expiring warning -->
      <div id="expiringWarn" style="display:none;background:rgba(255,214,10,.08);border:1px solid rgba(255,214,10,.25);border-radius:14px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--warning)" role="alert">
        ⏰ <strong id="expiringAmount"></strong> credits expire in <strong id="expiringDays"></strong> days.
      </div>

      <!-- Balance cards -->
      <div class="db-stats" style="margin-bottom:20px">
        <div class="db-stat s-electric" style="grid-column:span 2">
          <div class="db-stat-icon">💎</div>
          <div class="db-stat-val" id="creditBalanceLarge">…</div>
          <div class="db-stat-label">Credit Balance</div>
        </div>
        <div class="db-stat s-mint">
          <div class="db-stat-icon">⏱</div>
          <div class="db-stat-val" id="weeksEstimate" style="font-size:18px">…</div>
          <div class="db-stat-label">Weeks Left</div>
        </div>
        <div class="db-stat s-fire">
          <div class="db-stat-icon">🤝</div>
          <div class="db-stat-val" id="refEarned" style="font-size:18px">—</div>
          <div class="db-stat-label">Referral Earned</div>
        </div>
      </div>

      <!-- Credit Packs -->
      <h3 style="font-size:16px;font-weight:700;margin-bottom:14px" id="packs">Buy Credits</h3>
      <div class="db-packs" id="creditPacks">
        <div class="db-skel" style="height:180px;border-radius:18px"></div>
        <div class="db-skel" style="height:180px;border-radius:18px"></div>
        <div class="db-skel" style="height:180px;border-radius:18px"></div>
        <div class="db-skel" style="height:180px;border-radius:18px"></div>
      </div>
      <div style="background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.12);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--text-muted);margin-bottom:24px;text-align:center">
        💳 UPI · PhonePe · GPay · Paytm · NEFT — All in ₹ INR
      </div>

      <!-- Transactions -->
      <h3 style="font-size:16px;font-weight:700;margin-bottom:14px">Transaction History</h3>
      <div class="db-card" id="txList">
        <div class="db-skel db-skel-line" style="margin-bottom:14px"></div>
        <div class="db-skel db-skel-line" style="margin-bottom:14px"></div>
        <div class="db-skel db-skel-line"></div>
      </div>

    </main>
  </div>
</div>

<script type="module">
import { injectLayout } from '/js/core/layout.js';
import '/js/pages/billing.js';
await injectLayout({ title: 'Billing' });
</script>
</body>
</html>
