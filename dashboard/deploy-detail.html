<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment — EliteHosting.in</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#03020A">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/pages/dashboard.css">
</head>
<body>
<div class="dashboard-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="dashboard-main">
    <header id="topbar" class="topbar"></header>
    <main class="dashboard-content" aria-label="Deployment detail">

      <!-- Deployment Header -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--s4);margin-bottom:var(--s6)">
        <div>
          <div style="display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s2)">
            <a href="/dashboard/deploys.html" style="color:var(--text-muted);font-size:var(--text-sm)" aria-label="Back to deployments">← Back</a>
          </div>
          <div style="display:flex;align-items:center;gap:var(--s3)">
            <h2 id="deployName" style="margin:0">Loading…</h2>
            <span id="deployStatusBadge" class="badge">…</span>
          </div>
          <div id="deployUrlGroup" style="margin-top:var(--s2);display:none">
            <a id="deployUrl" href="#" target="_blank" rel="noopener"
               style="font-family:var(--font-mono);font-size:var(--text-sm);color:var(--electric)"></a>
            <button id="btnCopyUrl" class="btn btn-ghost btn-xs" style="margin-left:var(--s2)" aria-label="Copy URL">📋</button>
          </div>
        </div>
        <!-- Action Buttons -->
        <div style="display:flex;gap:var(--s3);flex-wrap:wrap">
          <button id="btnRedeploy" class="btn btn-electric btn-md">🔄 Redeploy</button>
          <button id="btnStop"     class="btn btn-ghost btn-md">⏹ Stop</button>
          <button id="btnDelete"   class="btn btn-danger btn-md">🗑 Delete</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" role="tablist" aria-label="Deployment sections" style="margin-bottom:var(--s5)">
        <button class="tab active" data-tab-trigger="logs"    role="tab" aria-controls="panel-logs">📋 Build Logs</button>
        <button class="tab" data-tab-trigger="metrics" role="tab" aria-controls="panel-metrics">📊 Metrics</button>
        <button class="tab" data-tab-trigger="info"    role="tab" aria-controls="panel-info">ℹ️ Info</button>
      </div>

      <!-- Logs Panel -->
      <div data-tab-panel="logs" id="panel-logs" class="active" role="tabpanel">
        <div class="card" style="padding:0;overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--s3) var(--s4);border-bottom:1px solid var(--border);background:var(--color-surface-2)">
            <div style="display:flex;align-items:center;gap:var(--s2)">
              <div class="terminal-dots">
                <div class="t-dot t-dot-red"></div>
                <div class="t-dot t-dot-yellow"></div>
                <div class="t-dot t-dot-green"></div>
              </div>
              <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">build-logs</span>
            </div>
            <div style="display:flex;gap:var(--s2)">
              <button id="btnPauseLogs"   class="btn btn-ghost btn-xs">⏸ Pause</button>
              <button id="btnClearLog"    class="btn btn-ghost btn-xs">🗑 Clear</button>
              <button id="btnDownloadLog" class="btn btn-ghost btn-xs">⬇ Download</button>
            </div>
          </div>
          <div id="logBody" class="terminal" style="height:420px;overflow-y:auto;padding:var(--s4)" role="log" aria-live="polite" aria-label="Build logs"></div>
        </div>
      </div>

      <!-- Metrics Panel -->
      <div data-tab-panel="metrics" id="panel-metrics" role="tabpanel" style="display:none">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:var(--s4);margin-bottom:var(--s5)">
          <div class="card card-sm">
            <div style="color:var(--text-muted);font-size:var(--text-xs);margin-bottom:var(--s2)">🖥 CPU Usage</div>
            <div style="font-size:var(--text-2xl);font-weight:700;color:var(--electric)" id="metricCpu">—</div>
            <canvas id="cpuChart" width="100%" height="60" style="margin-top:var(--s3)"></canvas>
          </div>
          <div class="card card-sm">
            <div style="color:var(--text-muted);font-size:var(--text-xs);margin-bottom:var(--s2)">🧠 RAM Usage</div>
            <div style="font-size:var(--text-2xl);font-weight:700;color:var(--plasma)" id="metricRam">—</div>
            <canvas id="ramChart" width="100%" height="60" style="margin-top:var(--s3)"></canvas>
          </div>
          <div class="card card-sm">
            <div style="color:var(--text-muted);font-size:var(--text-xs);margin-bottom:var(--s2)">📥 Network In</div>
            <div style="font-size:var(--text-2xl);font-weight:700;color:var(--mint)" id="metricNetRx">—</div>
          </div>
          <div class="card card-sm">
            <div style="color:var(--text-muted);font-size:var(--text-xs);margin-bottom:var(--s2)">📤 Network Out</div>
            <div style="font-size:var(--text-2xl);font-weight:700;color:var(--fire)" id="metricNetTx">—</div>
          </div>
        </div>
        <div class="alert alert-info">
          📊 Metrics update in real time when your app is running.
        </div>
      </div>

      <!-- Info Panel -->
      <div data-tab-panel="info" id="panel-info" role="tabpanel" style="display:none">
        <div class="card" style="padding:0;overflow:hidden">
          <table style="width:100%;border-collapse:collapse" id="infoTableBody"></table>
        </div>
      </div>

    </main>
  </div>
</div>

<script type="module">
import { injectLayout } from '/js/core/layout.js';
import '/js/pages/deployDetail.js';
await injectLayout({ title: 'Deployment' });
</script>
</body>
</html>
