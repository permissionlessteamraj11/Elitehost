<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03020A">
  <meta name="robots" content="noindex,nofollow">
  <title>Deployment — EliteHosting.in</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/dashboard.css">
  <script src="/env.js"></script>
</head>
<body>
<div id="db-toast"></div>
<div class="db-layout">
  <aside id="db-sidebar" class="db-sidebar"></aside>
  <div class="db-main">
    <header id="db-topbar" class="db-topbar"></header>
    <main class="db-page" aria-label="Deployment detail">

      <!-- Back + Deploy Name -->
      <div style="margin-bottom:16px">
        <a href="/dashboard/deploys.html"
           style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);text-decoration:none;margin-bottom:10px;touch-action:manipulation">
          ← Back to Apps
        </a>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <h2 class="db-page-title" id="deployName" style="margin:0">Loading…</h2>
          <span id="deployStatusBadge" style="padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700">…</span>
        </div>
        <div id="deployUrlGroup" style="display:none;margin-top:8px">
          <a id="deployUrl" href="#" target="_blank" rel="noopener noreferrer"
             style="font-family:var(--font-mono);font-size:12px;color:var(--electric)"></a>
          <button id="btnCopyUrl"
            style="margin-left:8px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--electric);cursor:pointer;touch-action:manipulation">
            📋 Copy
          </button>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="db-action-row" style="margin-bottom:20px">
        <button id="btnRestart"  class="db-action-btn primary">🔄 Restart</button>
        <button id="btnRedeploy" class="db-action-btn">📦 Redeploy</button>
        <button id="btnStop"     class="db-action-btn">⏹ Stop</button>
        <button id="btnDelete"   class="db-action-btn danger">🗑 Delete</button>
      </div>

      <!-- Tabs -->
      <div class="db-tabs" role="tablist">
        <button class="db-tab-btn is-active" data-tab="logs"    role="tab">📋 Logs</button>
        <button class="db-tab-btn"            data-tab="metrics" role="tab">📊 Metrics</button>
        <button class="db-tab-btn"            data-tab="info"    role="tab">ℹ️ Info</button>
      </div>

      <!-- Logs Panel -->
      <div class="db-tab-panel is-active" data-panel="logs">
        <div class="db-terminal">
          <div class="db-terminal-bar">
            <div class="db-terminal-dots">
              <div class="db-tdot db-tdot-r"></div>
              <div class="db-tdot db-tdot-y"></div>
              <div class="db-tdot db-tdot-g"></div>
            </div>
            <span class="db-terminal-title">build-logs</span>
            <div class="db-log-actions">
              <button id="btnPauseLogs"   class="db-log-btn" type="button">⏸ Pause</button>
              <button id="btnClearLog"    class="db-log-btn" type="button">🗑</button>
              <button id="btnDownloadLog" class="db-log-btn" type="button">⬇</button>
            </div>
          </div>
          <div id="logBody" class="db-log-body" role="log" aria-live="polite" aria-label="Build logs">
            <span style="color:var(--text-disabled)">Waiting for logs…</span>
          </div>
        </div>
      </div>

      <!-- Metrics Panel -->
      <div class="db-tab-panel" data-panel="metrics">
        <div class="db-metrics-grid" style="margin-bottom:16px">
          <div class="db-metric">
            <div class="db-metric-label">🖥 CPU</div>
            <div class="db-metric-val" id="metricCpu" style="color:var(--electric)">—</div>
            <canvas id="cpuChart" height="56" style="width:100%;margin-top:8px"></canvas>
          </div>
          <div class="db-metric">
            <div class="db-metric-label">🧠 RAM</div>
            <div class="db-metric-val" id="metricRam" style="color:var(--plasma)">—</div>
            <canvas id="ramChart" height="56" style="width:100%;margin-top:8px"></canvas>
          </div>
          <div class="db-metric">
            <div class="db-metric-label">📥 Net In</div>
            <div class="db-metric-val" id="metricNetRx" style="color:var(--mint)">—</div>
          </div>
          <div class="db-metric">
            <div class="db-metric-label">📤 Net Out</div>
            <div class="db-metric-val" id="metricNetTx" style="color:var(--fire)">—</div>
          </div>
        </div>
        <div style="background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.12);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--text-muted)">
          📊 Metrics update in real-time while your app is running.
        </div>
      </div>

      <!-- Info Panel -->
      <div class="db-tab-panel" data-panel="info">
        <div class="db-card" style="padding:0;overflow:hidden">
          <table id="infoTable" style="width:100%;border-collapse:collapse;font-size:13px">
            <tbody id="infoTableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script type="module">
import { injectLayout } from '/js/core/layout.js';
import '/js/pages/deployDetail.js';
await injectLayout({ title: 'Deployment' });
</script>
</body>
</html>
