<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03020A">
  <meta name="robots" content="noindex,nofollow">
  <title>Dashboard — EliteHosting.in</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/dashboard.css">
</head>
<body>
<div id="db-toast"></div>
<div class="db-layout">
  <aside id="db-sidebar" class="db-sidebar"></aside>
  <div class="db-main">
    <header id="db-topbar" class="db-topbar"></header>
    <main class="db-page" aria-label="Dashboard overview">

      <!-- Greeting -->
      <div style="margin-bottom:18px">
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px" id="greetTime">👋 Good morning</div>
        <h2 style="font-family:var(--font-display);font-size:22px;font-weight:800" id="greetName">Loading…</h2>
      </div>

      <!-- Credit warning -->
      <div id="creditWarning" style="display:none;background:rgba(255,214,10,.08);border:1px solid rgba(255,214,10,.25);border-radius:14px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--warning);display:none;align-items:center;justify-content:space-between;gap:12px" role="alert">
        <span>⚠️ Low balance: <strong id="creditWarnBal"></strong> credits</span>
        <a href="/dashboard/billing.html" style="background:var(--warning);color:#000;font-size:11px;font-weight:700;padding:5px 12px;border-radius:100px;text-decoration:none;white-space:nowrap">Top Up</a>
      </div>

      <!-- Stats -->
      <div class="db-stats" style="margin-bottom:20px">
        <div class="db-stat s-electric">
          <div class="db-stat-icon">🚀</div>
          <div class="db-stat-val" id="statRunning">
            <div class="db-skel db-skel-lg" style="width:48px"></div>
          </div>
          <div class="db-stat-label">Running</div>
        </div>
        <div class="db-stat s-mint">
          <div class="db-stat-icon">📦</div>
          <div class="db-stat-val" id="statTotal">
            <div class="db-skel db-skel-lg" style="width:48px"></div>
          </div>
          <div class="db-stat-label">Total Apps</div>
        </div>
        <div class="db-stat s-fire">
          <div class="db-stat-icon">❌</div>
          <div class="db-stat-val" id="statFailed">
            <div class="db-skel db-skel-lg" style="width:48px"></div>
          </div>
          <div class="db-stat-label">Failed</div>
        </div>
        <div class="db-stat s-plasma">
          <div class="db-stat-icon">💎</div>
          <div class="db-stat-val" style="color:var(--plasma)">
            <span class="credit-balance">…</span>
          </div>
          <div class="db-stat-label">Credits</div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="db-quick-actions" style="margin-bottom:20px">
        <a href="/dashboard/deploy-new.html" class="db-qa-btn qa-electric">
          <span class="db-qa-icon">⚡</span>
          New Deploy
        </a>
        <a href="/dashboard/ai.html" class="db-qa-btn qa-plasma">
          <span class="db-qa-icon">🤖</span>
          AI Assistant
        </a>
        <a href="/dashboard/billing.html" class="db-qa-btn qa-mint">
          <span class="db-qa-icon">💳</span>
          Buy Credits
        </a>
        <a href="https://t.me/elitehosting_bot" target="_blank" class="db-qa-btn qa-fire">
          <span class="db-qa-icon">📱</span>
          Telegram
        </a>
      </div>

      <!-- Credit Card -->
      <div class="db-credit-card" style="margin-bottom:20px">
        <div class="db-credit-label">💎 Credit Balance</div>
        <div class="db-credit-val"><span class="credit-balance">…</span></div>
        <div class="db-credit-sub">1 credit = 1 week of 1 running app</div>
        <a href="/dashboard/billing.html" style="display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--grad-electric);border-radius:100px;color:#000;font-size:13px;font-weight:700;text-decoration:none;touch-action:manipulation">
          Top Up →
        </a>
      </div>

      <!-- Recent Deployments -->
      <div class="db-section-head" style="margin-bottom:12px">
        <h3 class="db-section-title">Recent Apps</h3>
        <a href="/dashboard/deploys.html" class="db-section-link">View all →</a>
      </div>
      <div id="recentDeploys" style="display:flex;flex-direction:column;gap:10px">
        <div class="db-skel" style="height:68px;border-radius:16px"></div>
        <div class="db-skel" style="height:68px;border-radius:16px"></div>
        <div class="db-skel" style="height:68px;border-radius:16px"></div>
      </div>

    </main>
  </div>
</div>

<script type="module">
import { injectLayout } from '/js/core/layout.js';
import '/js/pages/dashboard.js';
await injectLayout({ title: 'Home' });
</script>
</body>
</html>
