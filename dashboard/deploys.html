<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03020A">
  <meta name="robots" content="noindex,nofollow">
  <title>Deployments — EliteHosting.in</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/dashboard.css">
  <script src="/env.js"></script>
</head>
<body>
<div id="db-toast"></div>
<div class="db-layout">
  <aside id="db-sidebar" class="db-sidebar"></aside>
  <div class="db-main">
    <header id="db-topbar" class="db-topbar"></header>
    <main class="db-page" aria-label="Deployments">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <div class="db-page-header" style="margin:0">
          <h2 class="db-page-title">Deployments</h2>
          <p class="db-page-sub">All your deployed applications</p>
        </div>
        <a href="/dashboard/deploy-new.html"
           style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--grad-electric);border-radius:100px;color:#000;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;touch-action:manipulation">
          ⚡ New Deploy
        </a>
      </div>

      <!-- Filter tabs -->
      <div class="db-filter-row">
        <button class="db-filter-btn is-active" data-filter="all">
          All <span class="db-filter-count" id="countAll">0</span>
        </button>
        <button class="db-filter-btn" data-filter="running">
          🟢 Running <span class="db-filter-count" id="countRunning">0</span>
        </button>
        <button class="db-filter-btn" data-filter="stopped">
          ⚪ Stopped <span class="db-filter-count" id="countStopped">0</span>
        </button>
        <button class="db-filter-btn" data-filter="failed">
          🔴 Failed <span class="db-filter-count" id="countFailed">0</span>
        </button>
      </div>

      <!-- Search -->
      <div class="db-search">
        <span class="db-search-icon">🔍</span>
        <input type="search" id="searchInput" placeholder="Search apps…" aria-label="Search deployments" autocomplete="off">
      </div>

      <!-- List -->
      <div id="deploysContainer" style="display:flex;flex-direction:column;gap:10px">
        <div class="db-skel" style="height:72px;border-radius:16px"></div>
        <div class="db-skel" style="height:72px;border-radius:16px"></div>
        <div class="db-skel" style="height:72px;border-radius:16px"></div>
      </div>

    </main>
  </div>
</div>

<script type="module">
import { injectLayout } from '/js/core/layout.js';
import '/js/pages/deploys.js';
await injectLayout({ title: 'Deployments' });
</script>
</body>
</html>
