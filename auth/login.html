<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EliteHosting.in | App Hosting India</title>
  <meta name="description" content="Sign in to EliteHosting.in — India's #1 PaaS. Mumbai servers, ₹ pricing, UPI payment.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://www.elitehosting.in/auth/login.html">
  <meta name="theme-color" content="#03020A">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/pages/auth.css">
  <script src="/env.js"></script>
</head>
<body class="auth-page">

<!-- Toast -->
<div class="auth-toast" id="authToast" role="alert" aria-live="polite"></div>

<!-- Animated Background -->
<div class="login-bg" aria-hidden="true">
  <div class="login-bg-grid"></div>
  <div class="login-bg-glow login-bg-glow-1"></div>
  <div class="login-bg-glow login-bg-glow-2"></div>
  <div class="login-bg-glow login-bg-glow-3"></div>
</div>

<!-- Page -->
<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <a href="/" class="auth-logo">
      <div class="auth-logo-mark">⚡</div>
      <div class="auth-logo-text">Elite<span>Hosting</span>.in</div>
    </a>

    <!-- Heading -->
    <div class="login-heading">
      <h1>Welcome <span class="hl-grad">back.</span></h1>
      <p>Sign in to your dashboard and ship something today.</p>
    </div>

    <!-- OAuth -->
    <div class="auth-oauth-row">
      <button class="auth-oauth-btn" id="btnGH" type="button" aria-label="Continue with GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </button>
      <button class="auth-oauth-btn" id="btnGG" type="button" aria-label="Continue with Google">
        <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
    </div>

    <div class="auth-divider"><span>or continue with email</span></div>

    <!-- Form -->
    <form id="loginForm" novalidate autocomplete="on">

      <!-- Email -->
      <div class="auth-field">
        <label class="auth-label" for="email">Email Address</label>
        <div class="auth-input-wrap">
          <input
            type="email" id="email" class="auth-input"
            placeholder="you@example.com"
            autocomplete="email" required
            aria-describedby="emailErr"
          >
          <span class="auth-input-icon" aria-hidden="true">📧</span>
        </div>
        <div class="auth-error-msg" id="emailErr" role="alert"></div>
      </div>

      <!-- Password -->
      <div class="auth-field">
        <div class="auth-field-head">
          <label class="auth-label" for="password">Password</label>
          <a href="#" class="auth-forgot" id="forgotLink">Forgot password?</a>
        </div>
        <div class="auth-input-wrap">
          <input
            type="password" id="password" class="auth-input"
            placeholder="Your password"
            autocomplete="current-password" required
            style="padding-right: 44px"
            aria-describedby="passErr"
          >
          <span class="auth-input-icon" aria-hidden="true">🔑</span>
          <button type="button" class="auth-pass-toggle" id="passToggle" aria-label="Show password">👁</button>
        </div>
        <div class="auth-error-msg" id="passErr" role="alert"></div>
      </div>

      <!-- Submit -->
      <button type="submit" class="auth-submit" id="submitBtn">
        <span id="submitLabel">Sign In →</span>
      </button>

    </form>

    <!-- Footer -->
    <div class="auth-card-footer">
      New to EliteHosting?
      <a href="/auth/register.html">Create free account 🎁</a>
    </div>

    <!-- Stats Strip -->
    <div class="auth-stats">
      <div class="auth-stat">
        <div class="auth-stat-val"><b>2,847</b>+</div>
        <div class="auth-stat-label">Developers</div>
      </div>
      <div class="auth-stat-sep"></div>
      <div class="auth-stat">
        <div class="auth-stat-val"><b>99.9</b>%</div>
        <div class="auth-stat-label">Uptime</div>
      </div>
      <div class="auth-stat-sep"></div>
      <div class="auth-stat">
        <div class="auth-stat-val">&lt;<b>30</b>ms</div>
        <div class="auth-stat-label">Latency</div>
      </div>
      <div class="auth-stat-sep"></div>
      <div class="auth-stat">
        <div class="auth-stat-val">₹<b>99</b></div>
        <div class="auth-stat-label">Starting</div>
      </div>
    </div>

  </div><!-- /login-card -->
</div><!-- /login-page -->

<script type="module">
import { authSB } from '/js/core/supabase.js';
import { auth }   from '/js/core/auth.js';

// Auth guard
await auth.requireGuest().catch(() => {});

// ── Toast ────────────────────────────────────────────────────────
const toastEl = document.getElementById('authToast');
let toastTimer;
function showToast(msg, type = 'info') {
  clearTimeout(toastTimer);
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  toastEl.className = `auth-toast ${type} visible`;
  toastEl.innerHTML = `<span>${icons[type] || 'ℹ'}</span>${msg}`;
  toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 3500);
}

// ── Password toggle ──────────────────────────────────────────────
const passEl = document.getElementById('password');
document.getElementById('passToggle').addEventListener('click', () => {
  passEl.type = passEl.type === 'text' ? 'password' : 'text';
});

// ── OAuth ────────────────────────────────────────────────────────
document.getElementById('btnGH').addEventListener('click', async () => {
  try   { await authSB.signInWithGitHub(); }
  catch { showToast('GitHub login failed. Try again.', 'error'); }
});
document.getElementById('btnGG').addEventListener('click', async () => {
  try   { await authSB.signInWithGoogle(); }
  catch { showToast('Google login failed. Try again.', 'error'); }
});

// ── Forgot password ──────────────────────────────────────────────
document.getElementById('forgotLink').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { showToast('Enter your email first, then click Forgot.', 'info'); return; }
  try {
    await authSB.resetPassword(email);
    showToast('Reset link sent! Check your inbox ✉', 'success');
  } catch {
    showToast('Could not send reset email. Try again.', 'error');
  }
});

// ── Form Submit ──────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submitBtn');
  const label    = document.getElementById('submitLabel');

  // Clear errors
  clearAllErrors();

  // Validate
  let valid = true;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    setError('email', 'emailErr', 'Enter a valid email address');
    valid = false;
  }
  if (!password) {
    setError('password', 'passErr', 'Password is required');
    valid = false;
  }
  if (!valid) return;

  // Loading state
  btn.disabled = true;
  label.innerHTML = '<span class="auth-spin"></span>';

  try {
    const { data } = await authSB.signIn({ email, password });
    showToast(`Welcome back, ${data.user?.username || 'there'}! 🎉`, 'success');
    const returnTo = new URLSearchParams(location.search).get('returnTo');
    setTimeout(() => { location.href = returnTo || '/dashboard/index.html'; }, 700);
  } catch (err) {
    const msg = err?.data?.error || 'Invalid email or password. Please try again.';
    showToast(msg, 'error');
    setError('email',    'emailErr', ' ');
    setError('password', 'passErr', msg);
    btn.disabled = false;
    label.textContent = 'Sign In →';
    // Shake the password field
    passEl.classList.add('auth-shake');
    setTimeout(() => passEl.classList.remove('auth-shake'), 400);
  }
});

// ── Clear errors on input ────────────────────────────────────────
['email', 'password'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById(id).classList.remove('has-error', 'auth-shake');
    const errId = id === 'email' ? 'emailErr' : 'passErr';
    document.getElementById(errId).textContent = '';
  });
});

function setError(inputId, errId, msg) {
  document.getElementById(inputId).classList.add('has-error');
  document.getElementById(errId).textContent = msg;
}
function clearAllErrors() {
  document.querySelectorAll('.auth-input').forEach(el => el.classList.remove('has-error'));
  document.querySelectorAll('.auth-error-msg').forEach(el => el.textContent = '');
}
</script>

</body>
</html>
