<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in… — EliteHosting.in</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#03020A">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--color-void)">
<div class="text-center anim-fade-in" style="padding:var(--s8)">
  <div style="width:56px;height:56px;border:3px solid var(--border);border-top-color:var(--electric);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto var(--s5)"></div>
  <h2 style="font-family:var(--font-display);font-size:var(--text-xl);margin-bottom:var(--s2)" id="statusMsg">Signing you in…</h2>
  <p style="color:var(--text-muted);font-size:var(--text-sm)" id="statusSub">Please wait a moment</p>
  <a href="/auth/login.html" style="display:inline-block;margin-top:var(--s8);color:var(--text-muted);font-size:var(--text-sm)">← Back to login</a>
</div>

<script type="module">
async function handleCallback() {
  const msg = document.getElementById('statusMsg');
  const sub = document.getElementById('statusSub');

  // Load Supabase and detect session from URL
  if (!window.supabase) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const sb = window.supabase.createClient(
    window.__ENV?.SUPABASE_URL || 'https://YOUR_PROJECT.supabase.co',
    window.__ENV?.SUPABASE_ANON_KEY || 'YOUR_ANON_KEY',
    { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
  );

  // Give Supabase time to process URL hash
  await new Promise(r => setTimeout(r, 1200));

  try {
    const { data: { session }, error } = await sb.auth.getSession();

    if (error || !session) {
      msg.textContent = '⚠️ Authentication failed';
      sub.textContent = 'Could not complete sign in. Please try again.';
      sub.style.color = 'var(--error)';
      setTimeout(() => location.href = '/auth/login.html', 2500);
      return;
    }

    msg.textContent = '✅ Signed in!';
    sub.textContent = `Welcome${session.user?.user_metadata?.full_name ? ', ' + session.user.user_metadata.full_name : ''}! Redirecting…`;
    sub.style.color = 'var(--mint)';

    const returnTo = new URLSearchParams(location.search).get('returnTo') || '/dashboard/index.html';
    setTimeout(() => location.href = returnTo, 800);
  } catch {
    msg.textContent = '⚠️ Something went wrong';
    sub.textContent = 'Redirecting to login…';
    setTimeout(() => location.href = '/auth/login.html', 2000);
  }
}

handleCallback();
</script>
</body>
</html>
