<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — EliteHosting.in</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#03020A">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/pages/auth.css">
  <script src="/env.js"></script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--color-void);padding:var(--s6)">

<div class="card card-lg anim-scale-in" style="max-width:460px;width:100%">
  <div style="text-align:center;margin-bottom:var(--s6)">
    <a href="/" style="display:inline-flex;align-items:center;gap:var(--s2);font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--text-primary);text-decoration:none;margin-bottom:var(--s5)">
      ⚡ Elite<span style="color:var(--electric)">Hosting</span>.in
    </a>
    <h1 style="font-size:var(--text-2xl);margin-bottom:var(--s2)">Set new password</h1>
    <p style="color:var(--text-muted)">Choose a strong password for your account</p>
  </div>

  <div id="formSection">
    <form id="resetForm" novalidate>
      <div class="input-group" style="margin-bottom:var(--s4)">
        <label class="input-label" for="newPass">New Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="newPass" class="input" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
          <button type="button" id="toggle1"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted)"
                  aria-label="Toggle">👁️</button>
        </div>
        <div class="strength-meter">
          <div class="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
          <span class="strength-label" id="strLabel"></span>
        </div>
        <span class="input-error-msg" id="passError" role="alert"></span>
      </div>

      <div class="input-group" style="margin-bottom:var(--s6)">
        <label class="input-label" for="confirmPass">Confirm Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirmPass" class="input" placeholder="Repeat your password" required autocomplete="new-password">
          <button type="button" id="toggle2"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted)"
                  aria-label="Toggle">👁️</button>
        </div>
        <span class="input-error-msg" id="confirmError" role="alert"></span>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-electric btn-lg w-full">
        <span class="btn-text">Set New Password →</span>
      </button>
    </form>
  </div>

  <div id="successSection" style="display:none;text-align:center;padding:var(--s6) 0">
    <div style="font-size:48px;margin-bottom:var(--s4)">✅</div>
    <h2 style="margin-bottom:var(--s3)">Password updated!</h2>
    <p style="color:var(--text-muted);margin-bottom:var(--s5)">Your password has been changed successfully.</p>
    <a href="/auth/login.html" class="btn btn-electric btn-lg">Sign In →</a>
  </div>

  <p style="text-align:center;margin-top:var(--s5);font-size:var(--text-sm);color:var(--text-muted)">
    <a href="/auth/login.html" style="color:var(--electric)">← Back to login</a>
  </p>
</div>

<script type="module">
import { authSB } from '/js/core/supabase.js';
import { toast } from '/js/components/toast.js';

const newPassEl   = document.getElementById('newPass');
const confirmEl   = document.getElementById('confirmPass');
const submitBtn   = document.getElementById('submitBtn');
const form        = document.getElementById('resetForm');
const segs        = [1,2,3,4].map(i => document.getElementById('seg'+i));
const strLabel    = document.getElementById('strLabel');

// Toggle passwords
document.getElementById('toggle1')?.addEventListener('click', () => {
  newPassEl.type = newPassEl.type === 'text' ? 'password' : 'text';
});
document.getElementById('toggle2')?.addEventListener('click', () => {
  confirmEl.type = confirmEl.type === 'text' ? 'password' : 'text';
});

// Strength meter
newPassEl?.addEventListener('input', () => {
  const str = calcStrength(newPassEl.value);
  segs.forEach((s, i) => {
    if (s) s.className = `strength-seg${i < str ? ' active-'+str : ''}`;
  });
  const lbls = ['','😬 Weak','🙂 Fair','😊 Good','💪 Strong'];
  if (strLabel) strLabel.textContent = newPassEl.value ? lbls[str] : '';
});

form?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = newPassEl.value;
  const cf = confirmEl.value;

  if (calcStrength(pw) < 2) {
    document.getElementById('passError').textContent = 'Password too weak';
    return;
  }
  if (pw !== cf) {
    document.getElementById('confirmError').textContent = 'Passwords do not match';
    return;
  }

  submitBtn.classList.add('btn-loading'); submitBtn.disabled = true;
  try {
    await authSB.updatePassword(pw);
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';
  } catch (err) {
    toast.error(err?.data?.error || 'Failed to update password. The link may have expired.');
  } finally {
    submitBtn.classList.remove('btn-loading'); submitBtn.disabled = false;
  }
});

function calcStrength(pw) {
  let s = 0;
  if (pw.length >= 8) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return Math.min(s, 4);
}
</script>
</body>
</html>
